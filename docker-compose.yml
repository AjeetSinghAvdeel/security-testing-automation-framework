services:
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: security-framework-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    networks:
      - security-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: security-framework-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PYTHONUNBUFFERED: "1"
      SAFE_MODE: "true"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./logs:/app/logs
      - ./reports:/app/reports
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      - mosquitto
    networks:
      - security-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: security-framework-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - security-network

networks:
  security-network:
    driver: bridge
