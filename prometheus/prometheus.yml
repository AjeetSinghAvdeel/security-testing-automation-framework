global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'security-framework-monitor'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'backend'
    static_configs:
      - targets: ['backend:5000']

  - job_name: 'elasticsearch'
    static_configs:
      - targets: ['elasticsearch:9200']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']

  - job_name: 'ganache'
    static_configs:
      - targets: ['ganache:7545']
